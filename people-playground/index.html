<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>People Playground (mini)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="toolbar">
      <button id="spawnBtn">Dodaj człowieka</button>
      <button id="clearBtn">Wyczyść</button>
      <button id="pauseBtn">Pauza</button>
      <label class="slider">
        Grawitacja Y:
        <input id="gravitySlider" type="range" min="-1" max="2" step="0.01" value="1" />
        <span id="gravityValue">1.00</span>
      </label>
      <button id="explosionToolBtn">Eksplozja: wył.</button>
      <label class="slider">
        Siła eksplozji:
        <input id="explosionPower" type="range" min="0" max="0.1" step="0.0025" value="0.03" />
        <span id="explosionPowerValue">0.03</span>
      </label>
      <span class="hint">Lewy przycisk: przeciągaj. Gdy włączona eksplozja: kliknij w scenę.</span>
    </div>
    <div id="canvasContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
